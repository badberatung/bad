<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS | Barrierefreie Badberatung</title>
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }
    #cms-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f5f5f5;
      color: #333;
    }
    #cms-loader h2 {
      margin: 0 0 12px;
      font-size: 1.5rem;
    }
    #cms-loader p {
      margin: 0;
      font-size: 1rem;
      color: #666;
    }
    #cms-error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #fff0f0;
      color: #c00;
      padding: 2rem;
      text-align: center;
    }
    #cms-error h2 {
      margin: 0 0 12px;
    }
    #cms-error pre {
      background: #fff;
      padding: 1rem;
      border-radius: 8px;
      text-align: left;
      max-width: 600px;
      overflow-x: auto;
      font-size: 0.85rem;
      color: #333;
    }
  </style>
</head>
<body>
  <!-- Lade-Indikator -->
  <div id="cms-loader">
    <h2>CMS wird geladen…</h2>
    <p>Bitte einen Moment Geduld.</p>
  </div>

  <!-- Fehler-Anzeige (wird per JS eingeblendet) -->
  <div id="cms-error">
    <h2>⚠️ CMS konnte nicht geladen werden</h2>
    <p>Prüfe die Browser-Konsole (F12 → Console) für Details.</p>
    <pre id="cms-error-details"></pre>
  </div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    (function() {
      var loader = document.getElementById('cms-loader');
      var errorBox = document.getElementById('cms-error');
      var errorDetails = document.getElementById('cms-error-details');

      // Prüfen ob Decap CMS geladen ist
      if (typeof window.CMS === 'undefined') {
        loader.style.display = 'none';
        errorBox.style.display = 'flex';
        errorDetails.textContent = 'window.CMS ist nicht definiert.\n\nMögliche Ursachen:\n' +
          '1. Content-Security-Policy blockiert https://unpkg.com\n' +
          '2. Netzwerkfehler beim Laden von decap-cms.js\n' +
          '3. Browser-Add-on blockiert das Script\n\n' +
          'Lösung: Netlify Identity & Git Gateway im Dashboard aktivieren,\n' +
          'oder die CSP-Headers in netlify.toml prüfen.';
        return;
      }

      // CMS ist geladen – Lade-Indikator ausblenden
      loader.style.display = 'none';

      // Netlify Identity initialisieren
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function(user) {
          if (!user) {
            window.netlifyIdentity.on('login', function() {
              document.location.href = '/admin/';
            });
          }
        });
      }
    })();
  </script>
</body>
</html>
